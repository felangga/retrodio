; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings for all environments
[env]
platform = https://github.com/pioarduino/platform-espressif32/
board = WT32SC01PLUS_N16R2
framework = arduino
monitor_speed = 115200

; Build flags
build_flags =
    -std=gnu++20
    -DCORE_DEBUG_LEVEL=2
    -DCONFIG_SPIRAM_USE_MALLOC
    -DCONFIG_SPIRAM_CACHE_WORKAROUND
    ; Increase TCP receive buffer for smoother streaming
    -DCONFIG_LWIP_TCP_WND_DEFAULT=16384
    -DCONFIG_LWIP_TCP_SND_BUF_DEFAULT=8192

; Library dependencies
lib_deps =
    https://github.com/lovyan03/LovyanGFX#develop
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.4.4
    bblanchon/ArduinoJson@7.0.4

; Filesystem
board_build.filesystem = littlefs

; USB Upload Environment (default)
[env:usb]
upload_speed = 921600

; OTA Upload Environment
[env:ota]
upload_protocol = espota
upload_port = retrodio.local
upload_flags =
    --port=3232
